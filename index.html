<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@v7xh</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #9b87f5;
            --bg-color: #0a0a0f;
            --card-bg: rgba(20, 20, 25, 0.65);
            --text-color: #ffffff;
            --secondary-text: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            background-color: var(--bg-color);
        }

        .animated-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(300deg, #000000, #1a0b2e, #111111, #2d1b4e);
            background-size: 240% 240%;
            animation: gradient-animation 18s ease infinite;
        }

        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        #overlay-text {
            color: white;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
            padding: 1rem;
        }

        .bio-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 700px;
            transform-style: preserve-3d;
            will-change: transform;
            transition: transform 0.1s ease-out;
        }

        .bio-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1.5rem;
            transform: translateZ(20px); 
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(155, 135, 245, 0.2);
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-info h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            color: var(--primary-color);
            text-shadow: 0 0 15px rgba(155, 135, 245, 0.4);
        }

        .description {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.85);
            font-weight: 400;
            margin-bottom: 0.8rem;
            font-style: italic;
        }

        .tags-container {
            display: flex;
            gap: 0.5rem;
        }

        .tag {
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 500;
        }

        .section-title {
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
            color: var(--secondary-text);
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateZ(10px);
        }

        .section-title::after {
            content: '';
            height: 1px;
            background: rgba(255,255,255,0.1);
            flex-grow: 1;
        }

        .games-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            transform: translateZ(15px);
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.27), background 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-decoration: none;
            color: inherit;
        }

        .game-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .game-img {
            height: 100px;
            width: 100%;
            background-size: cover;
            background-position: center;
        }

        .game-info {
            padding: 0.8rem;
        }

        .game-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-details {
            font-size: 0.75rem;
            color: var(--secondary-text);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .socials {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            transform: translateZ(15px);
        }

        .social-link {
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .social-link:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .social-icon {
            width: 18px;
            height: 18px;
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.75rem;
            letter-spacing: 1px;
            transform: translateZ(5px);
            margin-top: 1rem;
        }

        #music-control {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 100;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        #music-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #fff;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        #music-toggle:hover {
            transform: scale(1.1);
        }

        #volume-container {
            width: 0;
            overflow: hidden;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            padding-left: 0;
        }

        #music-control:hover #volume-container {
            width: 80px;
            padding-left: 10px;
            padding-right: 5px;
        }

        #volume-slider {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            outline: none;
        }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .bio-header {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
            .tags-container {
                justify-content: center;
            }
            .container {
                padding: 0.5rem;
            }
            .bio-card {
                padding: 1.5rem;
            }
            .bio-card {
                max-height: 95vh;
                overflow-y: auto; 
            }
        }
    </style>
</head>
<body>

    <script>
        window.addEventListener('load', function () {
            const card = document.querySelector('.bio-card');
            const overlay = document.getElementById('overlay');
            const music = document.getElementById('background-music');
            const volumeSlider = document.getElementById('volume-slider');
            const musicToggle = document.getElementById('music-toggle');
            
            if (card) {
                document.addEventListener('mousemove', function (e) {
                    const xAxis = (e.pageX - window.innerWidth / 2) / 25;
                    const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                    
                    card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                });

                document.addEventListener('mouseleave', function () {
                    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
                });
            }

            if (volumeSlider && music) {
                music.volume = 0.3; 
                volumeSlider.addEventListener('input', function () {
                    music.volume = this.value / 100;
                });
            }

            function startExperience() {
                if (music) {
                    music.play().catch(e => console.log("Audio requires interaction"));
                }
                if (overlay) {
                    overlay.style.opacity = '0';
                    overlay.style.visibility = 'hidden';
                }
            }

            if (overlay) {
                overlay.addEventListener('click', startExperience);
            }

            if (musicToggle && music) {
                musicToggle.addEventListener('click', function() {
                    if (music.paused) {
                        music.play();
                    } else {
                        music.pause();
                    }
                });
            }
        });
    </script>
